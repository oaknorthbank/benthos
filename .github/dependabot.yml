version: 2

updates:
  - package-ecosystem: gomod
    directory: "/"
    labels:
      - "dependencies"
      - "standard_change"
    schedule:
      interval: daily
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    labels:
      - "dependencies"
      - "standard_change"
    schedule:
      interval: daily
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
